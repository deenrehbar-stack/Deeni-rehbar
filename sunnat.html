                    arabic: "إِنَّ فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ وَاخْتِلَافِ اللَّيْلِ وَالنَّهَارِ آيَاتٍ لِّأُولِي الْأَلْبَابِ ﴿١٩٠﴾ الَّذِينَ يَذْكُرُونَ اللَّهَ قِيَامًا وَقُعُودًا وَعَلَىٰ جُنُوبِهِمْ وَيَتَفَكَّرُونَ فِي خَلْقِ السَّمَاوَاتِ وَالْأَرْضِ رَبَّنَا مَا خَلَقْتَ هَـٰذَا بَاطِلًا سُبْحَانَكَ فَقِنَا عَذَابَ النَّارِ ﴿١٩١﴾ رَبَّنَا إِنَّكَ مَن تُدْخِلِ النَّارَ فَقَدْ أَخْزَيْتَهُ ۖ وَمَا لِلظَّالِمِينَ مِنْ أَنصَارٍ ﴿١٩٢﴾ رَبَّنَا إِنَّنَا سَمِعْنَا مُنَادِيًا يُنَادِي لِلْإِيمَانِ أَنْ آمِنُوا بِرَبِّكُمْ فَآمَنَّا ۚ رَبَّنَا فَاغْفِرْ لَنَا ذُنُوبَنَا وَكَفِّرْ عَنَّا سَيِّئَاتِنَا وَتَوَفَّنَا مَعَ الْأَبْرَارِ ﴿١٩٣﴾ رَبَّنَا وَآتِنَا مَا وَعَدتَّنَا عَلَىٰ رُسُلِكَ وَلَا تُخْزِنَا يَوْمَ الْقِيَامَةِ ۗ إِنَّكَ لَا تُخْلِفُ الْمِيعَادَ ﴿١٩٤﴾ فَاسْتَجَابَ لَهُمْ رَبُّهُمْ أَنِّي لَا أُضِيعُ عَمَلَ عَامِلٍ مِّنكُم مِّن ذَكَرٍ أَوْ أُنثَىٰ ۖ بَعْضُكُم مِّن بَعْضٍ ۖ فَالَّذِينَ هَاجَرُوا وَأُخْرِجُوا مِن دِيَارِهِمْ وَأُوذُوا فِي سَبِيلِي وَقَاتَلُوا وَقُتِلُوا لَأُكَفِّرَنَّ عَنْهُمْ سَيِّئَاتِهِمْ وَلأُدْخِلَنَّهُمْ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ ثَوَابًا مِّنْ عِندِ اللَّهِ ۗ وَاللَّهُ عِندَهُ حُسْنُ الثَّوَابِ ﴿١٩٥﴾ لَا يَغُرَّنَّكَ تَقَلُّبُ الَّذِينَ كَفَرُوا فِي الْبِلَادِ ﴿١٩٦﴾ مَتَاعٌ قَلِيلٌ ثُمَّ مَأْوَاهُمْ جَهَنَّمُ ۚ وَبِئْسَ الْمِهَادُ ﴿١٩٧﴾ لَـٰكِنِ الَّذِينَ اتَّقَوْا رَبَّهُمْ لَهُمْ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ خَالِدِينَ فِيهَا نُزُلًا مِّنْ عِندِ اللَّهِ ۗ وَمَا عِندَ اللَّهِ خَيْرٌ لِّلأَبْرَارِ ﴿١٩٨﴾ وَإِنَّ مِنْ أَهْلِ الْكِتَابِ لَمَن يُؤْمِنُ بِاللَّهِ وَمَا أُنزِلَ إِلَيْكُمْ وَمَا أُنزِلَ إِلَيْهِمْ خَاشِعِينَ لِلَّهِ لَا يَشْتَرُونَ بِآيَاتِ اللَّهِ ثَمَنًا قَلِيلًا ۗ أُولَـٰئِكَ لَهُمْ أَجْرُهُمْ عِندَ رَبِّهِمْ ۗ إِنَّ اللَّهَ سَرِيعُ الْحِسَابِ ﴿١٩٩﴾ يَا أَيُّهَا الَّذِينَ آمَنُوا اصْبِرُوا وَصَابِرُوا وَرَابِطُوا وَاتَّقُوا اللَّهَ لَعَلَّكُمْ تُفْلِحُونَ ﴿٢٠٠﴾"
},

                        title: "Replying to Azan:", 
                        detail: "When the Muezzin says: اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ (Allahu Akbar, Allahu Akbar), you also say: اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ\nWhen the Muezzin says: أَشْهَدُ أَنْ لَا إِلٰهَ إِلَّا اللَّهُ (Ashhadu al-la ilaha illallah), you also  the Muezzin says: أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ (Ashhadu anna Muhammadar Rasoolullah), you also say: أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ\nWhen the Muezzin says: حَيَّ عَلَى الصَّلَاةِ (Hayya 'alas-salah), you say: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ (La hawla wa la quwwata illa billah)\nWhen the Muezzin says: حَيَّ عَلَى الْفَلَاحِ (Hayya 'alal-falah), you say: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ (La hawla wa la quwwata illa billah)\nWhen the Muezzin says: اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ (Allahu Akbar, Allahu Akbar), you also say: اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ\nWhen the Muezzin says: لَا إِلٰهَ إِلَّا اللَّهُ (La ilaha illallah), you also say: لَا إِلٰهَ إِلَّا اللَّهُ"

    function applySettings() {
        // localStorage से चुनी हुई भाषा निकालें, डिफ़ॉल्ट 'hi' (हिंदी) रखें
        const lang = localStorage.getItem('pref_lang') || 'hi';
        const data = sunnatData[lang] || sunnatData['hi'];
        
        // पेज के टाइटल और टेक्स्ट अपडेट करें
        document.getElementById('pageTitle').innerText = data.title;
        document.getElementById('pageSub').innerText = data.sub;
        

        // पूरा कंटेंट लूप चलाकर रेंडर करें
        let html = '';
        data.sections.forEach(sec => {
            html += `<div class="section-header">${sec.name}</div>`;
            sec.items.forEach(item => {
                html += `
                    <div class="sunnat-card">
                        
                        <h3>${item.num}. ${item.title}</h3>
                        <p>${item.detail}</p>
                        ${item.arabic ? `<div class="arabic-text">${item.arabic}</div>` : ''}
                    </div>
                `;
            });
        });
        document.getElementById('dynamic-content').innerHTML = html;
    }

  

    

    // पेज लोड होते ही सेटिंग्स अप्लाई करें
    window.onload = applySettings;
</script>
