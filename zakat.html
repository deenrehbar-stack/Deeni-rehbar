<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakat Calculator - Deeni Rehbar</title>
    <style>
        :root {
            --p-green: #004d40;
            --gold: #c5a059;
            --bg-light: #f4fbf4;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding-bottom: 40px;
            direction: ltr; /* Hindi is left-to-right */
        }

        .header {
            background: var(--p-green);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .back-btn {
            position: absolute; left: 20px; top: 40px;
            color: white; text-decoration: none; font-size: 22px;
        }

        .container { padding: 20px; }

        .calc-card {
            background: var(--white);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e0eee0;
        }

        .input-group { margin-bottom: 20px; text-align: left; }

        label {
            display: block;
            font-weight: bold;
            color: var(--p-green);
            margin-bottom: 8px;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #eee;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--gold); }

        .result-box {
            background: var(--p-green);
            color: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid var(--gold);
        }

        .result-title { font-size: 15px; opacity: 0.9; font-weight: bold; }
        .result-amount { font-size: 30px; font-weight: bold; margin-top: 5px; color: var(--gold); }

        .info-text {
            font-size: 13px;
            color: #555;
            margin-top: 15px;
            text-align: center;
            line-height: 1.6;
        }

        .nisab-badge {
            background: #fff8e1;
            color: #b8860b;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px dashed var(--gold);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">⬅️</a>
        <h2 style="margin:0;">ज़कात कैलकुलेटर</h2>
        <p style="font-size: 14px; opacity: 0.9;">आसानी से अपनी ज़कात का हिसाब लगाएं</p>
    </div>

    <div class="container">
        
        <div class="nisab-badge">
            <b>नोट:</b> ज़कात केवल उस माल पर फ़र्ज़ है जो निसाब (52.5 तोला चांदी या 7.5 तोला सोना) के बराबर हो और उस पर एक साल गुज़र चुका हो।
        </div>

        <div class="calc-card">
            <div class="input-group">
                <label>सोना और चांदी (कुल कीमत)</label>
                <input type="number" id="goldSilver" placeholder="₹ 0.00" oninput="calculateZakat()">
            </div>

            <div class="input-group">
                <label>नकद (बैंक और घर में मौजूद)</label>
                <input type="number" id="cash" placeholder="₹ 0.00" oninput="calculateZakat()">
            </div>

            <div class="input-group">
                <label>व्यापार का माल (Business Assets)</label>
                <input type="number" id="business" placeholder="₹ 0.00" oninput="calculateZakat()">
            </div>

            <div class="input-group">
                <label>कर्ज जो आपको देना है (-)</label>
                <input type="number" id="debts" placeholder="₹ 0.00" oninput="calculateZakat()">
            </div>

            <div class="result-box">
                <div class="result-title">कुल ज़कात (2.5%)</div>
                <div class="result-amount">₹ <span id="totalZakat">0.00</span></div>
            </div>

            <p class="info-text">
                आपके कुल माल से जरूरी कर्ज निकालने के बाद, बची हुई रकम का 40वां हिस्सा (2.5%) ज़कात कहलाता है।
            </p>
        </div>
    </div>

    <script>
        function calculateZakat() {
            // Getting values
            const goldSilver = parseFloat(document.getElementById('goldSilver').value) || 0;
            const cash = parseFloat(document.getElementById('cash').value) || 0;
            const business = parseFloat(document.getElementById('business').value) || 0;
            const debts = parseFloat(document.getElementById('debts').value) || 0;

            // Calculation
            const totalAssets = goldSilver + cash + business;
            const netAmount = totalAssets - debts;
            
            let zakat = 0;
            if (netAmount > 0) {
                zakat = netAmount * 0.025; // 2.5%
            }

            // Display result with formatting
            document.getElementById('totalZakat').innerText = zakat.toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    </script>

</body>
</html>
