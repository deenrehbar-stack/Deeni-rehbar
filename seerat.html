                sections: [
                    { h: "1. जन्म", p: "विलादत: मक्का की उस तारीकी रात में जब आप (ﷺ) पैदा हुए, तो आपके दादा अब्दुल मुत्तलिब ने आपका नाम \"मुहम्मद\" रखा—ऐसा नाम जो तब से पहले अरब में मशहूर न था।\n\nबचपन: आपका बचपन यतीमी में गुज़रा। वालिद (अब्दुल्लाह) का साया उठ चुका था, और 6 साल की उम्र में माँ (आमिना) का भी साया सर से उठ गया। फिर दादा और चाचा अबू तालिब की सरपरस्ती रही। यह दर्द, यह अकेलापन, और दुनिया के तजरबात ही थे जिन्होंने आपको अंदर से इतना मज़बूत बनाया कि आपने कभी किसी की मोहताजी का शिकवा नहीं किया।" },

    sections: [
        { h: "1. Birth", p: "Wiladat: In that dark night of Makkah when you (ﷺ) were born, your grandfather Abdul Muttalib named you \"Muhammad\"—a name that was never famous in Arabia before then.\n\nChildhood: Your childhood was spent in orphanhood. The shadow of your father (Abdullah) had already departed, and at the age of 6, the shadow of your mother (Amina) also left your head. After that, you remained under the guardianship of your grandfather and uncle Abu Talib. It was this pain, this loneliness, and the experiences of the world that made you so strong from within that you never complained about being dependent on anyone." },
        { h: "2. Meccan Era and Trials", p: "Amidst the hot sand of Makkah and its mountains, when you raised the call of \"La Ilaha Illallah\" for the first time, a strange commotion erupted throughout the city.\n\n1. Thorns on the paths and the silent grief of home: When you (ﷺ) went for prayers, thorns were scattered on your way. When you were in prostration (Sajdah) under the shadow of the Kaaba, the enemies would place the camel's intestines on your back. Your beloved daughter Hazrat Fatima (R.A.) would remove them while crying.\n\n2. Sh'ib-e-Abi Talib: When the Quraish saw that your influence was growing, they socially boycotted you and your family for 3 years. The condition was such that the Companions (Sahaba) survived by chewing leaves of trees.\n\n3. Aam-ul-Huzn (The Year of Sorrow): During this time, your greatest supports, uncle Abu Talib and faithful life partner Hazrat Khadija (R.A.), passed away.\n\n4. Journey to Taif: When you went to Taif, the people there pelted you with stones. Your shoes bled. When the angel asked for permission to crush the city between the mountains, you prayed:\n<span class=\"arabic-inline\">اللَّهُمَّ اهْدِ قَوْمِي فَإِنَّهُمْ لَا يَعْلَمُونَ</span>\n\"O Allah! Guide my nation, for they do not know.\"" },
        { h: "3. Youth and Prophethood", p: "You grazed sheep and did trade. Seeing your honesty during a trade journey, Hazrat Khadija (R.A.) sent a marriage proposal. You got married at the age of 25. This was the era when people used to swear by your honesty. Your character was so clean that you never hurt anyone's feelings." },
        { h: "4. Beginning of Revelation", p: "At the age of 40, the arrival of Jibrail (A.S.) in the Cave of Hira and that first word \"Iqra\" (Read). From here, the system of the world began to change. You said: \"Even if they place the sun in my right hand and the moon in my left hand, I will still not step back from this work (Tawheed).\"" },
        { h: "5. Migration to Medina", "p": "The journey from Makkah to Medina was the beginning of a revolution.\n\n1. The love of Hazrat Ali (R.A.): You made Hazrat Ali sleep on your bed so that the trusts (Amanat) could be returned.\n\n2. Cave of Thawr: You took refuge in the cave with Hazrat Abu Bakr (R.A.). When the enemies came close, you said:\n<span class=\"arabic-inline\">لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا</span>\n\"Do not grieve, indeed Allah is with us.\"" },
        { h: "6. Medina's System and the Conquest of Makkah", p: "1. Masjid-e-Nabawi: This was not just a place of worship, but a school, a court, and a parliament. You (ﷺ) built it yourself along with the laborers.\n\n2. Mithaq-e-Medina: You prepared the world's first written constitution.\n\n3. Mawakhat (Brotherhood): You established such brotherhood between the Muhajireen (migrants) from Makkah and the Ansar of Medina, an example of which cannot be found in the world.\n\n4. Conquest of Makkah: When you entered Makkah with an army of 10,000, you forgave all those enemies who had persecuted you." },
        { h: "7. Demise and Final Message", p: "On the occasion of Hajjat-ul-Wida, you said: \"An Arab has no superiority over a non-Arab, nor a black person over a white person, except by piety (Taqwa).\"\n\nYour last will was: \"As-Salah, As-Salah\" (Take care of the prayers). You kept ethics alive in the world." }
    ]

            ar: {

    sections: [
        { h: "1. المولد والنشأة", p: "الولادة: في تلك الليلة المظلمة من مكة التي وُلدت فيها (ﷺ)، سماك جدك عبد المطلب \"محمدًا\"—وهو اسم لم يكن مشهورًا في بلاد العرب من قبل.\n\nالطفولة: قضيت طفولتك في اليتم. فقد رحل ظل والدك (عبد الله) قبل ولادتك، وفي سن السادسة رحل ظل والدتك (آمنة) أيضًا عن رأسك. بعد ذلك، كنت تحت رعاية جدك وعمك أبي طالب. إن هذا الألم، وهذا السواد، وتجارب العالم هي التي جعلتك قويًا جدًا من الداخل لدرجة أنك لم تشكُ أبدًا من حاجتك لأحد." },
        { h: "2. العهد المكي والابتلاءات", p: "وسط رمال مكة الحارة وجبالها، عندما رفعت نداء \"لا إله إلا الله\" لأول مرة، حدثت ضجة غريبة في جميع أنحاء المدينة.\n\n1. أشواك الطرق وحزن البيت الصامت: عندما كنت تذهب (ﷺ) للصلاة، كانت الأشواك تُبسط في طريقك. وعندما كنت في السجود تحت ظل الكعبة، كان الأعداء يضعون سلا الجزور (أمعاء الإبل) على ظهرك. وكانت ابنتك الحبيبة فاطمة (رضي الله عنها) تزيلها وهي تبكي.\n\n2. شعب أبي طالب: عندما رأى قريش أن تأثيرك يزداد، قاطعوك أنت وعائلتك اجتماعيًا لمدة 3 سنوات. وكانت الحالة لدرجة أن الصحابة كانوا يعيشون على مضغ أوراق الشجر.\n\n3. عام الحزن: في هذه الأثناء، توفي أكبر داعميك، عمك أبو طالب وشريكة حياتك الوفية خديجة (رضي الله عنها).\n\n4. رحلة الطائف: عندما ذهبت إلى الطائف، رماك أهلها بالحجارة حتى دميت قدماك. وعندما طلب الملك الإذن بإطباق الجبال على المدينة، دعوت قائلًا:\n<span class=\"arabic-inline\">اللَّهُمَّ اهْدِ قَوْمِي فَإِنَّهُمْ لَا يَعْلَمُونَ</span>\n\"اللهم اهدِ قومي فإنهم لا يعلمون.\"" },
        { h: "3. الشباب والنبؤة", p: "لقد رعيت الغنم وعملت في التجارة. ورأت خديجة (رضي الله عنها) صدقك وأمانتك خلال رحلة تجارية، فأرسلت إليك طلب الزواج. وتزوجت في سن الـ 25. كان هذا العصر الذي كان الناس يحلفون فيه بأمانتك. كانت أخلاقك طاهرة لدرجة أنك لم تجرح مشاعر أحد أبدًا." },
        { h: "4. بدء الوحي", p: "في سن الأربعين، جاء جبريل (عليه السلام) في غار حراء وكانت تلك الكلمة الأولى \"اقرأ\". ومن هنا، بدأ نظام العالم يتغير. وقلت: \"والله لو وضعوا الشمس في يميني والقمر في يساري على أن أترك هذا الأمر (التوحيد) ما تركته\"." },
        { h: "5. الهجرة إلى المدينة", p: "كانت الرحلة من مكة إلى المدينة بداية الثورة.\n\n1. عشق علي (رضي الله عنه): جعلت عليًا ينام في فراشك حتى تُرد الأمانات إلى أهلها.\n\n2. غار ثور: لجأت إلى الغار مع أبي بكر (رضي الله عنه). وعندما اقترب الأعداء، قلت:\n<span class=\"arabic-inline\">لَا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا</span>\n\"لا تحزن، إن الله معنا.\"" },
        { h: "6. نظام المدينة وفتح مكة", p: "1. المسجد النبوي: لم يكن هذا مجرد مكان للعبادة، بل كان مدرسة، ومحكمة، وبرلمانًا. وقد بنيته (ﷺ) بنفسك مع العمال.\n\n2. ميثاق المدينة: لقد أعددت أول دستور مكتوب في العالم.\n\n3. المؤاخاة: لقد أقمت أخوة بين المهاجرين القادمين من مكة والأنصار في المدينة، وهي أخوة لا يوجد لها مثيل في العالم.\n\n4. فتح مكة: عندما دخلت مكة بجيش قوامه 10,000 مقاتل، عفوت عن كل أولئك الأعداء الذين عذبوك واضطهدوك." },
        { h: "7. الوفاة والرسالة الأخيرة", p: "في حجة الوداع، قلت: \"لا فضل لعربي على أعجمي، ولا لأسود على أبيض إلا بالتقوى\".\n\nوكانت وصيتك الأخيرة: \"الصلاة، الصلاة\" (حافظوا على الصلاة). لقد أحييت الأخلاق في العالم." }

        function applyLang() {
            const lang = localStorage.getItem('pref_lang') || 'hi'; 
            const data = seeratData[lang] || seeratData['hi'];
            
            document.getElementById('mainHtml').dir = data.dir;
            document.getElementById('app-title').innerText = data.title;
            document.getElementById('app-subtitle').innerText = data.subtitle;
            
            document.getElementById('lbl-1').innerText = data.labels[0];
            document.getElementById('val-1').innerText = data.labels[1];
            document.getElementById('lbl-2').innerText = data.labels[2];
            document.getElementById('val-2').innerText = data.labels[3];

            const area = document.getElementById('content-area');
            area.innerHTML = '';
            data.sections.forEach((s, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.id = 'sec-' + i;
                card.innerHTML = `<h2>${s.h}</h2><div class="content-text">${s.p}</div>`;

                area.appendChild(card);
            });
            stopVoice();
        }

        function speak(id, lang) {
            stopVoice();
            const card = document.getElementById(id);
            const text = card.querySelector('.content-text').innerText;
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = { hi: 'hi-IN', ur: 'ur-PK', en: 'en-US', ar: 'ar-SA' };
            utterance.lang = voices[lang] || 'hi-IN';
            utterance.onstart = () => card.classList.add('reading');
            utterance.onend = () => card.classList.remove('reading');
            window.speechSynthesis.speak(utterance);
        }

        function stopVoice() {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.card').forEach(c => c.classList.remove('reading'));
        }

        window.onload = applyLang;
    </script>
</body>
</html>
