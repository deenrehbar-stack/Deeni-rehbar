        // 1. Home Page se language utha kar Page Setup karna
        function applySettings() {
            const lang = localStorage.getItem('pref_lang') || 'hi'; 

            const content = translations[lang];

            // Header ka Title badalna
            document.getElementById('mainTitle').innerText = content.title;

            // Urdu/Arabic ke liye Right-to-Left setting
            document.body.style.direction = (content.dir === 'rtl') ? 'rtl' : 'ltr';

            const indexPage = document.getElementById('index-page');
            indexPage.innerHTML = ''; 

            // Topics generate karna
            content.topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                
                // Click Logic
                card.onclick = () => (topic.id === 'locked') ? handleLocked() : showTopic(topic.id);

                const arrow = (content.dir === 'rtl') ? '←' : '➔';
                card.innerHTML = `<span class="topic-title">${topic.name}</span><span>${arrow}</span>`;
                indexPage.appendChild(card);
            });
        }

        // 2. Topic khulne par Ayaton ki list dikhana
        function showTopic(topicKey) {
            const topic = data[topicKey];
            if (!topic) return;

            document.getElementById('index-page').style.display = 'none';
            document.getElementById('items-section').style.display = 'block';
            document.getElementById('selected-topic-name').innerText = topic.name;

            const listDiv = document.getElementById('ayat-list');
            listDiv.innerHTML = '';
            
            topic.items.forEach(item => {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.onclick = () => openModal(item);
                row.innerHTML = `
                    <span class="item-title">${item.surah}</span>
                    <span class="item-info">Para: ${item.para} | Ayat: ${item.ayat}</span>
                `;
                listDiv.appendChild(row);
            });
        }
        // 3. Back button function
        function showIndex() {
            document.getElementById('index-page').style.display = 'block';
            document.getElementById('items-section').style.display = 'none';
        }

                // 4. Modal mein sahi Language ka tarjuma dikhana
        function openModal(item) {
            const lang = localStorage.getItem('pref_lang') || 'hi'; 

            const body = document.getElementById('modal-body');
            
            // Item mein se selected language uthao, warna hindi dikhao
            const translation = item[lang] || item['hindi'];
            
            // Label ke liye text
            const labels = { 
                hi: 'तर्जुमा', 
                en: 'Translation', 
                ur: 'ترجمہ', 
                ar: 'الترجمة' 
            };

            body.innerHTML = `
                <div style="font-size:12px; color:#666; margin-bottom:5px;">${item.surah} (Ayat: ${item.ayat})</div>
                <div class="ayat-arabic">${item.arabic}</div>
                <div class="tarjuma-box"><b>${labels[lang] || 'Tarjuma'}:</b><br>${translation}</div>
            `;
            document.getElementById('imageModal').style.display = 'block';
        }

        // 5. Helpers
        function closeImage() { document.getElementById('imageModal').style.display = 'none'; }
        
        function handleLocked() { 
            const lang = localStorage.getItem('pref_lang') || 'hi'; 
            const msg = (lang === 'ur') ? 'یہ ڈیٹا جلد آ رہا ہے' : 
                        (lang === 'en') ? 'Data coming soon' : 'इसका डेटा जल्द आएगा';
            alert(msg); 
        }

        // Window click se modal band karna
        window.onclick = function(event) {
            let modal = document.getElementById('imageModal');
            if (event.target == modal) { modal.style.display = "none"; }
        }

        // Sabse important: Page load hote hi settings apply karna
        window.onload = applySettings;

    </script>
