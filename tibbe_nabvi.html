    const list = document.getElementById('shifaList');

    function applySettings() {
        const lang = localStorage.getItem('pref_lang') || 'hi';
        const data = curesData[lang] || curesData['hi'];
        
                // UI Text Update के नीचे का कोड:
        
        document.getElementById('pageMainTitle').innerText = data.mainTitle || "🌿 Tibb-e-Nabwi";
        document.getElementById('pageSubTitle').innerText = data.subTitle || "";
        document.getElementById('searchInput').placeholder = data.searchPlace || "Search...";
        document.getElementById('homeBtn').innerText = data.homeTxt || "🏠 Home";
        
        // RTL Logic (Urdu اور Arabic کے لیے ترتیب دائیں سے بائیں کرنا)
        if(lang === 'ur' || lang === 'ar') {
            document.body.classList.add('rtl-layout');
        } else {
            document.body.classList.remove('rtl-layout');
        }
        
        // पेज लोड होते ही लिस्ट दिखाना
        displayCures(data.list, data.benefitLabel, data.noResult);
    }

    // डेटा को HTML में दिखाने वाला फ़ंक्शन
    function displayCures(items, label, noResMsg) {
        const list = document.getElementById('shifaList');
        list.innerHTML = items.length > 0 ? "" : `<p style='text-align:center;'>${noResMsg}</p>`;
        
        items.forEach(item => {
            list.innerHTML += `
                <div class="shifa-card">
                    <span class="shifa-no">#${item.id}</span>
                    <span class="shifa-title">${item.title}</span>
                    <p class="shifa-desc">${item.desc}</p>
                    <div class="shifa-benefit">${label}${item.benefit}</div>
                </div>`;
        });
    }

    // सर्च (Search) करने वाला फ़ंक्शन
    function searchFunction() {
        const lang = localStorage.getItem('pref_lang') || 'hi';
        const data = curesData[lang] || curesData['hi'];
        let input = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = data.list.filter(item => 
            item.title.toLowerCase().includes(input) || 
            item.desc.toLowerCase().includes(input)
        );
        displayCures(filtered, data.benefitLabel, data.noResult);
    }

    // पेज खुलने पर सबसे पहले settings लोड करें
    window.onload = applySettings;
