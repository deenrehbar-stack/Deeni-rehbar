        function fillTable(id, data) {
            const body = document.getElementById(id);
            body.innerHTML = "";
            data.forEach(item => {
                let row = `<tr>
                    <td><span class="name-en">${item.en}</span></td>
                    <td style="text-align:right">
                        <span class="name-ar">${item.ar}</span>
                        <span class="hindi-meaning"><b>${t.label}</b> ${item.hi}</span>
                    </td>
                </tr>`;
                body.innerHTML += row;
            });
        }

        function showTab(type) {
            document.querySelectorAll('.names-list').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(type).classList.add('active');
            
            if(type === 'boys') {
                document.getElementById('btn-boys').classList.add('active');
            } else {
                document.getElementById('btn-girls').classList.add('active');
            }
        }

        // Initialize tables on load
        fillTable('boys-body', boysData);
        fillTable('girls-body', girlsData);
