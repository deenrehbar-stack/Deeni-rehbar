    tr_fatiha: "English Translation: All praise is due to Allah, the Lord of all worlds. The Most Gracious, the Most Merciful. Master of the Day of Judgment. You alone we worship, and from You alone we seek help. Guide us to the straight path, the path of those upon whom You have bestowed favor, not of those who have evoked Your anger or of those who are astray.",

    h4: "4. Joining a Surah",
    p_surah: "After reciting Surah Fatiha, recite any one Surah from the Quran. If the Surah is long, it is mandatory (Wajib) to recite at least one long verse or three short verses after Surah Fatiha.",
    tr_falaq: "English Translation: Say, I seek refuge in the Lord of daybreak. From the evil of that which He created. And from the evil of darkness when it settles. And from the evil of the blowers in knots. And from the evil of an envier when he envies.",

    h5: "5. Going into Ruku",
    p_ruku: "Go into Ruku while saying 'Allahu Akbar'. Bend down, hold your knees firmly with both hands, and keep your fingers spread. Keep your back perfectly straight, as if a cup of water placed on it would not spill. Keep your head in line with your back—neither raised too high nor bent too low. Keep your gaze towards your toes and feet and recite this Tasbih at least 3 times.",
    tr_ruku: "English Translation: Glory be to my Lord, the Almighty.",

    h6: "6. Performing Sajda",
    p_sajda: "Stand up straight after Ruku, then go into Sajda while saying 'Allahu Akbar'. Place your knees on the ground first, then hands, then nose and forehead. Place both hands on the ground near the ears so that the fingers are facing the Qibla. Fix your nose and forehead firmly on the ground and keep your gaze on your nose. For men, it is necessary not to let their elbows touch the ground and to keep the stomach separate from the legs. Bend the toes and keep them facing the Qibla. There are two prostrations in one Rakat. It is necessary to sit straight for a short while between the two prostrations, which is called 'Jalsa'. And recite this Tasbih at least 3 times while in Sajda.",
    tr_sajda: "English Translation: Glory be to my Lord, the Most High.",

    section3: "Second Rakat",
    h12: "Qira'at (Recitation)",
    p_rakat: "After completing the first Rakat, stand up straight with hands tied, then recite Surah Fatiha and any one Surah from the Quran as recited in the first Rakat.",
    h13: "Ruku and Sajda",
    p_rukusajda: "Then perform Ruku and Sajda as in the first Rakat.",

    h7: "Tashahhud (Attahiyat)",
    p_tash: "Now sit down and place your right hand on your right thigh and your left hand on your left thigh. Keep your fingers near the knees in a normal way and your gaze should be towards your lap. It is Sunnah for men to spread the left foot and sit on it, and keep the right foot upright with the fingers bent towards the Qibla. In this state, recite:",
    tr_tash: "English Translation: All compliments, prayers, and pure words are due to Allah. Peace be upon you, O Prophet, and the mercy of Allah and His blessings. Peace be upon us and on the righteous servants of Allah. I bear witness that there is no god but Allah, and I bear witness that Muhammad is His servant and Messenger.",
    p_note: "Note: When you say (Ash-hadu alla), raise the index finger. When you say (ilaha illallah), lower the finger.",

    h8: "Durood-e-Ibrahim (Complete)",
    p_ibrahim: "Recite Durood-e-Ibrahim after Attahiyat.",
    tr_durood: "English Translation: O Allah, send grace and honor on Muhammad and on the family of Muhammad, as You sent grace and honor on Ibrahim and on the family of Ibrahim. Surely, You are Praiseworthy, Most Glorious. O Allah, send blessings on Muhammad and on the family of Muhammad, as You sent blessings on Ibrahim and on the family of Ibrahim. Surely, You are Praiseworthy, Most Glorious.",

    h9: "Dua-e-Masura",
    p_masoora: "Then recite Dua-e-Masura.",
    tr_masura: "English Translation: O Allah, I have greatly wronged my soul, and no one can forgive sins except You. So grant me forgiveness from Your special presence and have mercy on me. Surely, You are the Most Forgiving, Most Merciful.",

    h10: "Rabbana Atina",
    p_rabbana: "And finally, recite Rabbana Atina.",
    tr_rabbana: "English Translation: Our Lord, give us good in this world and good in the Hereafter, and save us from the punishment of the Fire.",

    h11: "Turning for Salam",
    p_salam: "While turning your face to the right (right shoulder), say: 'Assalamu alaikum wa rahmatullah'. At this time, your gaze should be on your right shoulder, then turn your face to the left (left shoulder) and say: 'Assalamu alaikum wa rahmatullah'. At this time, your gaze should be on your left shoulder.",
    tr_salam: "English Translation: Peace and mercy of Allah be upon you.",
},

    section2: "نماز پڑھنے کا طریقہ",

// नया लॉजिक: localStorage और URL दोनों को चेक करेगा
function applySettings() {
    const params = new URLSearchParams(window.location.search);
    const urlLang = params.get('lang');
    const localLang = localStorage.getItem('pref_lang');

    // अगर URL में भाषा है तो उसे प्राथमिकता दें, वरना localStorage, वरना 'hi'
    const finalLang = urlLang || localLang || 'hi';
    changeLang(finalLang);
}

window.onload = applySettings;
