function changeLang(lang) {
    const d = translationsData[lang] || translationsData['hi'];
    
    // Page ki title aur sub-title badlein
    document.getElementById('main-title').innerText = d.title;
    document.getElementById('sub-title').innerText = d.sub;
    
    // Direction (RTL/LTR) set karein
    document.body.dir = d.dir; 
    
    // Container ki alignment theek karein
    const container = document.getElementById('content-area');
    container.style.textAlign = (d.dir === 'rtl') ? 'right' : 'left';

    
    container.innerHTML = `
        <div class="guide-text">${d.g1}</div>
        <div class="card">
            <span class="instruction-text">${d.c1}</span>
            <span class="action-step">${d.c1_action}</span>
        </div>

        <div class="guide-text">${d.g2}</div>
        <div class="card">
            <span class="step-title">${d.c2_intro}</span>
            <span class="action-step">${d.c2_n1}</span>
            <span class="action-step">${d.c2_n2}</span>
            <span class="action-step">${d.c2_n3}</span>
            <span class="instruction-text" style="margin-top:10px;">${d.c2_qirat}</span>
            <span class="action-step">${d.c2_ruku}</span>
        </div>

        <div class="guide-text">${d.g3}</div>
        <div class="card">
            <span class="step-title">${d.c3_intro}</span>
            <span class="action-step">${d.c3_n1}</span>
            <span class="action-step">${d.c3_n2}</span>
            <span class="action-step">${d.c3_n3}</span>
            <span class="warning-box">${d.c3_n4}</span>
        </div>

        <div class="guide-text">${d.g4}</div>
        <div class="card">
            <span class="instruction-text">${d.c4}</span>
            <span class="action-step">${d.c4_salam}</span>
        </div>
    `;
}
function init() {
    // Home page se select ki hui language yahan se milti hai
    const lang = localStorage.getItem('pref_lang') || 'hi';

}

window.onload = init;
